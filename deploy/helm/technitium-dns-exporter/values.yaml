replicaCount: 1

image:
  repository: ghcr.io/supporterino/technitium-prometheus-exporter
  tag: ""
  pullPolicy: IfNotPresent

config:
  exporter:
    listen_address: ":9119"
    metrics_path: "/metrics"
    scrape_timeout: 30s
    log_level: "info"
  targets: []

service:
  type: ClusterIP
  port: 9119

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 25s
  labels: {}

grafana:
  dashboards:
    enabled: false
    label: grafana_dashboard
    labelValue: "1"

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9119"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
