version: 2

builds:
  - id: exporter
    main: ./cmd/exporter
    binary: technitium-dns-exporter
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format_overrides:
      - goos: windows
        format: zip
    files:
      - config/config.yaml

checksum:
  name_template: 'checksums.txt'

sboms:
  - artifacts: archive
    documents:
      - '{{ .ProjectName }}_{{ .Version }}_sbom.spdx.json'

dockers:
  - image_templates:
      - 'ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Tag }}'
      - 'ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Major }}.{{ .Minor }}'
      - 'ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Major }}'
      - 'ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:latest'
    dockerfile: deploy/Dockerfile
    use: buildx
    build_flag_templates:
      - '--platform=linux/amd64,linux/arm64'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^style:'
      - '^ci:'
      - '^Merge'
